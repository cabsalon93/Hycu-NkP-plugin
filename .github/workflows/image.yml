name: build-image

# Construit l'image (multi-arch) et la pousse sur ghcr.io :
#  - push / merge dans `main`            -> reconstruit :latest (+ :main)
#  - tag `vX.Y.Z`                        -> image versionnée :vX.Y.Z + tarball air-gap
#  - « Run workflow » (workflow_dispatch) -> build à la demande sur n'importe quelle branche
on:
  push:
    branches: ["main"]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Métadonnées
        id: meta
        run: |
          echo "img=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"
          ref="${GITHUB_REF_NAME:-manual}"
          ref="${ref//\//-}"   # un ref de branche peut contenir « / », interdit dans un tag Docker
          echo "tag=${ref}" >> "$GITHUB_OUTPUT"

      - name: Build & push (amd64 + arm64)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ steps.meta.outputs.img }}:${{ steps.meta.outputs.tag }}
            ${{ steps.meta.outputs.img }}:latest

      - name: Tarball air-gap (amd64)
        run: |
          docker buildx build --platform linux/amd64 --file deploy/Dockerfile \
            --tag hycu-nkp:${{ steps.meta.outputs.tag }} --load .
          docker save hycu-nkp:${{ steps.meta.outputs.tag }} \
            | gzip > hycu-nkp-${{ steps.meta.outputs.tag }}-amd64.tar.gz

      - uses: actions/upload-artifact@v4
        with:
          name: hycu-nkp-image-tarball
          path: hycu-nkp-*.tar.gz
          retention-days: 30
